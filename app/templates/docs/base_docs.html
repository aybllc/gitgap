{% extends "base.html" %}
{% block content %}
<style>
  /* ── Docs sub-nav ── */
  .docs-subnav {
    border-bottom: 1px solid var(--border);
    padding: 0 40px;
    display: flex;
    gap: 0;
    overflow-x: auto;
  }
  .docs-subnav a {
    display: inline-block;
    padding: 10px 16px;
    font-size: 13px;
    font-weight: 500;
    color: var(--ink-3);
    text-decoration: none;
    border-bottom: 2px solid transparent;
    margin-bottom: -1px;
    white-space: nowrap;
  }
  .docs-subnav a:hover { color: var(--ink); text-decoration: none; }
  .docs-subnav a.active { color: var(--ink); border-bottom-color: var(--ink); }
/* ── Docs content ── */
  .docs-content {
    max-width: 800px;
    padding: 40px 40px;
  }
  .docs-content h1 {
    font-size: 26px;
    font-weight: 600;
    letter-spacing: -0.02em;
    margin-bottom: 8px;
  }
  .docs-content .docs-lead {
    font-size: 15px;
    color: var(--ink-2);
    line-height: 1.7;
    margin-bottom: 40px;
    border-bottom: 1px solid var(--border);
    padding-bottom: 24px;
  }
  .docs-content h2 {
    font-size: 16px;
    font-weight: 600;
    letter-spacing: -0.01em;
    margin: 36px 0 12px;
  }
  .docs-content h3 {
    font-size: 13px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
    color: var(--ink-3);
    margin: 28px 0 8px;
  }
  .docs-content p {
    font-size: 14px;
    line-height: 1.75;
    color: var(--ink-2);
    margin-bottom: 16px;
  }
  .docs-content ul, .docs-content ol {
    padding-left: 20px;
    margin-bottom: 16px;
  }
  .docs-content li {
    font-size: 14px;
    line-height: 1.75;
    color: var(--ink-2);
    margin-bottom: 4px;
  }
  .docs-content code {
    font-family: monospace;
    font-size: 12px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    color: var(--ink);
  }
  .docs-content pre {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 16px 20px;
    overflow-x: auto;
    margin-bottom: 20px;
  }
  .docs-content pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 12px;
    line-height: 1.7;
  }
  .docs-table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 24px;
    font-size: 13px;
  }
  .docs-table th {
    text-align: left;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.07em;
    color: var(--ink-3);
    border-bottom: 1px solid var(--border);
    padding: 8px 12px;
  }
  .docs-table td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    vertical-align: top;
    color: var(--ink-2);
    line-height: 1.6;
  }
  .docs-table td:first-child { font-weight: 500; color: var(--ink); }
  .docs-callout {
    background: var(--surface);
    border: 1px solid var(--border);
    border-left: 3px solid var(--ink);
    border-radius: 0 8px 8px 0;
    padding: 14px 18px;
    margin-bottom: 20px;
    font-size: 13px;
    color: var(--ink-2);
    line-height: 1.65;
  }
  .docs-step {
    display: flex;
    gap: 20px;
    margin-bottom: 28px;
    align-items: flex-start;
  }
  .docs-step-num {
    width: 28px;
    height: 28px;
    min-width: 28px;
    background: var(--ink);
    color: #fff;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 12px;
    font-weight: 600;
    margin-top: 2px;
  }
  .docs-step-body h4 {
    font-size: 14px;
    font-weight: 600;
    margin-bottom: 6px;
  }
  .docs-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    margin-left: 6px;
    vertical-align: middle;
  }
  .docs-badge-done     { background: var(--ink); color: #fff; }
  .docs-badge-progress { background: var(--surface); color: var(--ink-2); border: 1px solid var(--border); }
  .docs-badge-planned  { background: transparent; color: var(--ink-3); border: 1px solid var(--border); }
</style>

<!-- Docs sub-nav -->
<nav class="docs-subnav">
  <a href="/docs/quickstart"     {% if doc_page == 'quickstart'     %}class="active"{% endif %}>Quickstart</a>
  <a href="/docs/origin"         {% if doc_page == 'origin'         %}class="active"{% endif %}>Origin</a>
  <a href="/docs/workflow"       {% if doc_page == 'workflow'       %}class="active"{% endif %}>Workflow</a>
  <a href="/docs/journals"       {% if doc_page == 'journals'       %}class="active"{% endif %} style="margin-left:20px;">Journals</a>
  <a href="/docs/submit-journal" {% if doc_page == 'submit-journal' %}class="active"{% endif %}>Submit Yours</a>
  <a href="/docs/api-ingest"     {% if doc_page == 'api-ingest'     %}class="active"{% endif %} style="margin-left:20px;">API Ingest</a>
  <a href="/docs/roadmap"        {% if doc_page == 'roadmap'        %}class="active"{% endif %} style="margin-left:20px;">Roadmap</a>
  <a href="/docs/funding"        {% if doc_page == 'funding'        %}class="active"{% endif %}>Funding</a>
  <a href="/docs/open-source"    {% if doc_page == 'open-source'    %}class="active"{% endif %}>Open Source</a>
  <a href="/docs/ai-policy"      {% if doc_page == 'ai-policy'      %}class="active"{% endif %} style="margin-left:20px;">AI Policy</a>
  <a href="/docs/glossary"       {% if doc_page == 'glossary'       %}class="active"{% endif %} style="margin-left:20px;">Glossary</a>
</nav>

<div class="docs-content">
  {% block docs_content %}{% endblock %}
</div>
{% endblock %}

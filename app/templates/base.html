<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{% block title %}gitgap{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      corePlugins: { preflight: false },
      theme: { extend: { colors: { primary: { 600: '#0284c7', 700: '#0369a1' } } } }
    }
  </script>
  <style>
    :root {
      --ink:      #18171A;
      --ink-2:    #3D3C40;
      --ink-3:    #76747A;
      --border:   #E2E0E5;
      --surface:  #F8F7F5;
      --bg:       #FFFFFF;
      --accent:   #0284c7;
      --go:       #18171A;
      --pending:  #76747A;
      --fail:     #C0BFBF;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--ink);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
    }
    a { color: inherit; text-decoration: none; }
    a:hover { text-decoration: underline; }

    /* ── Nav ── */
    .nav {
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex;
      align-items: center;
      gap: 32px;
      height: 52px;
    }
    .nav-brand {
      font-size: 15px;
      font-weight: 600;
      letter-spacing: -0.02em;
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .nav-brand .doctrine {
      font-size: 11px;
      font-weight: 400;
      color: var(--ink-3);
      letter-spacing: 0.04em;
    }
    .nav-links { display: flex; gap: 24px; margin-left: auto; }
    .nav-links a {
      font-size: 13px;
      color: var(--ink-3);
      font-weight: 500;
    }
    .nav-links a.active, .nav-links a:hover { color: var(--ink); }

    /* ── Layout ── */
    .page { padding: 40px 40px; flex: 1; }
    .page-header { margin-bottom: 32px; }
    .page-title { font-size: 22px; font-weight: 600; letter-spacing: -0.02em; }
    .page-sub { font-size: 13px; color: var(--ink-3); margin-top: 4px; }

    /* ── Stats strip ── */
    .stats-strip {
      display: flex;
      gap: 24px;
      margin-bottom: 32px;
      flex-wrap: wrap;
    }
    .stat-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 16px 20px;
      min-width: 120px;
    }
    .stat-card .val {
      font-size: 26px;
      font-weight: 600;
      letter-spacing: -0.03em;
      line-height: 1;
    }
    .stat-card .lbl {
      font-size: 11px;
      color: var(--ink-3);
      margin-top: 4px;
      text-transform: uppercase;
      letter-spacing: 0.06em;
    }

    /* ── Filters ── */
    .filters {
      display: flex;
      gap: 12px;
      margin-bottom: 20px;
      flex-wrap: wrap;
      align-items: center;
    }
    .filters select, .filters input {
      border: 1px solid var(--border);
      border-radius: 6px;
      padding: 6px 10px;
      font-family: inherit;
      font-size: 13px;
      background: var(--bg);
      color: var(--ink);
    }
    .btn {
      display: inline-block;
      padding: 7px 16px;
      border-radius: 6px;
      font-family: inherit;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
      border: none;
    }
    .btn-primary { background: var(--ink); color: #fff; }
    .btn-primary:hover { background: var(--ink-2); }
    .btn-outline { background: transparent; color: var(--ink); border: 1px solid var(--border); }
    .btn-outline:hover { border-color: var(--ink); }
    .btn-pass { background: var(--ink); color: #fff; }
    .btn-fail { background: transparent; color: var(--ink-3); border: 1px solid var(--border); }
    .btn-fail:hover { border-color: var(--ink-3); color: var(--ink-2); }

    /* ── Table ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; }
    thead th {
      text-align: left;
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--ink-3);
      font-weight: 600;
      border-bottom: 1px solid var(--border);
      padding: 10px 12px;
    }
    tbody td {
      padding: 14px 12px;
      border-bottom: 1px solid var(--border);
      vertical-align: top;
    }
    tbody tr:hover td { background: var(--surface); }
    .decl-text {
      font-size: 13px;
      color: var(--ink-2);
      max-width: 420px;
      overflow: hidden;
      display: -webkit-box;
      -webkit-line-clamp: 2;
      -webkit-box-orient: vertical;
    }

    /* ── Badges ── */
    .badge {
      display: inline-block;
      padding: 2px 8px;
      border-radius: 4px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .badge-pending { background: var(--surface); color: var(--ink-3); border: 1px solid var(--border); }
    .badge-pass    { background: var(--ink); color: #fff; }
    .badge-fail    { background: var(--border); color: var(--ink-3); }
    .badge-go      { background: var(--ink); color: #fff; }

    /* ── Confidence bar ── */
    .conf-bar {
      display: flex;
      align-items: center;
      gap: 8px;
    }
    .conf-track {
      width: 48px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      overflow: hidden;
    }
    .conf-fill { height: 100%; background: var(--ink); border-radius: 2px; }
    .conf-val { font-size: 12px; color: var(--ink-3); }

    /* ── Detail card ── */
    .detail-grid {
      display: grid;
      grid-template-columns: 1fr 320px;
      gap: 32px;
      align-items: start;
    }
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 24px;
    }
    .card-title {
      font-size: 11px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.07em;
      color: var(--ink-3);
      margin-bottom: 12px;
    }
    .declaration-block {
      font-size: 15px;
      line-height: 1.7;
      border-left: 3px solid var(--ink);
      padding-left: 16px;
      margin: 20px 0;
    }
    .meta-row {
      display: flex;
      gap: 6px;
      font-size: 13px;
      margin-bottom: 8px;
    }
    .meta-row .meta-key { color: var(--ink-3); min-width: 80px; }
    .review-form { display: flex; gap: 10px; margin-top: 16px; }

    /* ── Pagination ── */
    .pagination {
      display: flex;
      gap: 8px;
      align-items: center;
      margin-top: 24px;
      font-size: 13px;
    }
    .pagination a {
      padding: 5px 10px;
      border: 1px solid var(--border);
      border-radius: 5px;
      color: var(--ink-2);
    }
    .pagination a:hover { border-color: var(--ink); color: var(--ink); text-decoration: none; }
    .pagination .current {
      padding: 5px 10px;
      background: var(--ink);
      color: #fff;
      border-radius: 5px;
    }
    .pagination .total { color: var(--ink-3); margin-left: 8px; }

    /* ── Gap Dial Sidebar ─────────────────────────────── */
    #gap-dial {
      width: 200px;
      min-width: 200px;
      height: calc(100vh - 52px);
      position: sticky;
      top: 52px;
      overflow: hidden;
      border-right: 1px solid var(--border);
      background: var(--surface);
      display: flex;
      flex-direction: column;
      align-self: flex-start;
      flex-shrink: 0;
    }
    #dial-scroll {
      flex: 1;
      overflow-y: scroll;
      scroll-snap-type: y mandatory;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
      display: flex;
      flex-direction: column;
      scrollbar-width: none;
    }
    #dial-scroll::-webkit-scrollbar { display: none; }
    .dial-item {
      height: 44px;
      min-height: 44px;
      scroll-snap-align: center;
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 0 8px;
      cursor: pointer;
      user-select: none;
      overflow: hidden;
      transition: background 0.1s;
    }
    .dial-item:hover { background: var(--bg); }
    .dial-item.dial-center {
      background: var(--bg);
      box-shadow: 0 1px 0 var(--border), 0 -1px 0 var(--border);
    }
    .dial-dot {
      width: 7px;
      height: 7px;
      border-radius: 50%;
      flex-shrink: 0;
      opacity: calc(0.4 + 0.6 * var(--amp, 0));
    }
    .dial-label {
      font-size: 10px;
      line-height: 1.2;
      color: var(--ink-2);
      flex: 1;
      overflow: hidden;
      white-space: nowrap;
      text-overflow: ellipsis;
      opacity: calc(0.35 + 0.65 * var(--amp, 0));
    }
    .dial-item.dial-center .dial-label {
      color: var(--ink);
      font-size: 11px;
      font-weight: 600;
    }
    .dial-spike {
      display: block;
      height: 2px;
      border-radius: 1px;
      background: var(--accent);
      flex-shrink: 0;
      width: calc(var(--score, 0) * var(--amp, 0) * 36px);
      transition: width 0.06s ease-out;
    }
    .dial-err {
      font-size: 10px;
      color: var(--ink-3);
      padding: 16px 8px;
      text-align: center;
    }
    /* ── Dial hover card ── */
    #dial-hover {
      position: fixed;
      left: 208px;
      z-index: 1000;
      width: 240px;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 14px 16px;
      box-shadow: 0 8px 24px rgba(0,0,0,0.10);
      pointer-events: none;
      opacity: 0;
      transform: translateY(-50%) translateX(-4px);
      transition: opacity 0.12s ease, transform 0.12s ease;
    }
    #dial-hover.visible {
      opacity: 1;
      transform: translateY(-50%) translateX(0);
    }
    #dial-hover .dh-title {
      font-size: 12px;
      font-weight: 600;
      color: var(--ink);
      margin-bottom: 5px;
      line-height: 1.4;
    }
    #dial-hover .dh-tagline {
      font-size: 11px;
      color: var(--ink-3);
      line-height: 1.5;
      margin-bottom: 10px;
    }
    #dial-hover .dh-badges {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
    }
    #dial-hover .dh-badge {
      font-size: 10px;
      font-weight: 500;
      padding: 2px 7px;
      border-radius: 4px;
      background: var(--surface);
      border: 1px solid var(--border);
      color: var(--ink-2);
      text-transform: capitalize;
    }
    #main-wrap    { display: flex; flex: 1; overflow: hidden; min-height: 0; }
    #page-content { flex: 1; overflow-y: auto; min-width: 0; }
    @media (max-width: 768px) { #gap-dial { display: none; } }
  </style>
</head>
<body>

<nav class="nav">
  <div class="nav-brand">
    gitgap
    <span class="doctrine">NAUGHT → CAUGHT → FOUND</span>
  </div>
  <div class="nav-links">
    <a href="/" {% if active == 'globe' %}class="active"{% endif %}>Globe</a>
    <a href="/view/gaps" {% if active == 'gaps' %}class="active"{% endif %}>Gaps</a>
    <a href="/view/holes" {% if active == 'holes' %}class="active"{% endif %}>Structural Holes</a>
    <a href="/view/rejected" {% if active == 'rejected' %}class="active"{% endif %}>Rejected Trail</a>
    <a href="/view/runs" {% if active == 'runs' %}class="active"{% endif %}>Runs</a>
    <a href="/docs/">Docs</a>
    <a href="/docs/submit-journal"
       style="color:var(--accent); font-weight:500;">Submit Journal →</a>
    <a href="/api/docs">API</a>
    <a href="/admin/" {% if active == 'admin' %}class="active"{% endif %}>Admin</a>
  </div>
</nav>

<div id="dial-hover" aria-hidden="true">
  <div class="dh-title"></div>
  <div class="dh-tagline"></div>
  <div class="dh-badges"></div>
</div>
<div id="main-wrap">
  <aside id="gap-dial"></aside>
  <div id="page-content">
    {% block content %}{% endblock %}
  </div>
</div>

<footer style="border-top:1px solid var(--border); padding:28px 40px;
               display:flex; justify-content:space-between; align-items:center;
               font-size:12px; color:var(--ink-3); flex-shrink:0;">
  <div>
    <strong style="color:var(--ink); font-size:13px;">gitgap</strong>
    <span style="margin-left:12px; letter-spacing:0.03em;">NAUGHT → CAUGHT → FOUND</span>
  </div>
  <div style="display:flex; gap:24px;">
    <a href="/docs/quickstart" style="color:var(--ink-3);">Docs</a>
    <a href="/docs/submit-journal" style="color:var(--ink-3);">Submit a Journal</a>
    <a href="/docs/open-source" style="color:var(--ink-3);">Open Source</a>
    <a href="/docs/ai-policy" style="color:var(--ink-3);">AI Policy</a>
  </div>
</footer>

<script>
(function () {
  'use strict';
  const ITEM_H  = 44;
  const VISIBLE = 9;
  const HALF    = Math.floor(VISIBLE / 2);

  function currentGapId() {
    const m = location.pathname.match(/\/view\/gaps\/(\d+)/);
    return m ? parseInt(m[1], 10) : null;
  }
  function verdictColor(v) {
    if (v === 'pass') return '#22c55e';
    if (v === 'fail') return '#ef4444';
    return '#9ca3af';
  }
  function gapScore(g) {
    const s = g.cap_score != null ? g.cap_score : (g.confidence || 0);
    return Math.min(1, Math.max(0, s));
  }
  const hoverCard  = document.getElementById('dial-hover');
  const hoverTitle = hoverCard && hoverCard.querySelector('.dh-title');
  const hoverTag   = hoverCard && hoverCard.querySelector('.dh-tagline');
  const hoverBadge = hoverCard && hoverCard.querySelector('.dh-badges');
  let   hoverTimer = null;

  function showHover(g, anchorEl) {
    if (!hoverCard) return;
    clearTimeout(hoverTimer);
    hoverTitle.textContent = g.gateway_term || ('#' + g.id);
    hoverTag.textContent   = g.declaration_short
      ? (g.declaration_short + (g.declaration_short.length >= 140 ? '…' : ''))
      : (g.paper_title || '');

    // Build discipline badges
    hoverBadge.innerHTML = '';
    const disciplines = new Set();
    if (g.source_discipline) disciplines.add(g.source_discipline);
    if (g.target_disciplines) {
      try {
        const td = JSON.parse(g.target_disciplines);
        if (Array.isArray(td)) td.forEach(function (d) { disciplines.add(d); });
      } catch (e) {}
    }
    disciplines.forEach(function (d) {
      const b = document.createElement('span');
      b.className   = 'dh-badge';
      b.textContent = d.replace(/_/g, ' ');
      hoverBadge.appendChild(b);
    });

    // Position: vertically centered on the hovered item
    const rect = anchorEl.getBoundingClientRect();
    hoverCard.style.top = (rect.top + rect.height / 2) + 'px';
    hoverCard.classList.add('visible');
  }

  function hideHover() {
    if (!hoverCard) return;
    hoverTimer = setTimeout(function () {
      hoverCard.classList.remove('visible');
    }, 80);
  }

  function buildItem(g) {
    const item = document.createElement('div');
    item.className  = 'dial-item';
    item.dataset.id = g.id;
    item.style.setProperty('--score', gapScore(g));
    const dot = document.createElement('span');
    dot.className = 'dial-dot';
    dot.style.background = verdictColor(g.keeper_verdict);
    const label = document.createElement('span');
    label.className   = 'dial-label';
    label.textContent = g.gateway_term || ('#' + g.id);
    const spike = document.createElement('span');
    spike.className = 'dial-spike';
    item.appendChild(dot);
    item.appendChild(label);
    item.appendChild(spike);
    item.addEventListener('click', function () { location.href = '/view/gaps/' + g.id; });
    item.addEventListener('mouseenter', function () { showHover(g, item); });
    item.addEventListener('mouseleave', hideHover);
    return item;
  }
  function updateCenter(container) {
    const centerY   = container.scrollTop + container.clientHeight / 2;
    const centerIdx = Math.round((centerY - ITEM_H / 2) / ITEM_H);
    container.querySelectorAll('.dial-item').forEach(function (el, i) {
      const dist = Math.abs(i - centerIdx);
      const amp  = Math.max(0, 1 - dist / (HALF + 1));
      el.style.setProperty('--amp', amp.toFixed(3));
      el.classList.toggle('dial-center', dist === 0);
    });
  }
  async function init() {
    const aside = document.getElementById('gap-dial');
    if (!aside) return;
    let gaps;
    try {
      const resp = await fetch('/gaps/dial');
      if (!resp.ok) throw new Error(resp.status);
      gaps = await resp.json();
    } catch (e) {
      aside.innerHTML = '<p class="dial-err">dial unavailable</p>';
      return;
    }
    if (!gaps.length) {
      aside.innerHTML = '<p class="dial-err">no gaps yet</p>';
      return;
    }
    const container = document.createElement('div');
    container.id = 'dial-scroll';
    const spacer = function (h) {
      const d = document.createElement('div');
      d.style.cssText = 'height:' + h + 'px;flex-shrink:0;';
      return d;
    };
    container.appendChild(spacer(ITEM_H * HALF));
    const targetId = currentGapId();
    let targetIdx  = 0;
    gaps.forEach(function (g, i) {
      const el = buildItem(g);
      if (g.id === targetId) targetIdx = i;
      container.appendChild(el);
    });
    container.appendChild(spacer(ITEM_H * HALF));
    aside.appendChild(container);
    updateCenter(container);
    if (targetId) container.scrollTop = targetIdx * ITEM_H;
    let ticking = false;
    container.addEventListener('scroll', function () {
      if (!ticking) {
        requestAnimationFrame(function () { updateCenter(container); ticking = false; });
        ticking = true;
      }
    }, { passive: true });
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', init);
  } else {
    init();
  }
})();
</script>
</body>
</html>
